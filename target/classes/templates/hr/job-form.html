<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Post Job – RecruitEase</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <a href="/hr/dashboard"  class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <a href="/hr/jobs"       class="nav-item"><i class="fa fa-briefcase"></i> My Jobs</a>
      <a href="/hr/jobs/new"   class="nav-item active"><i class="fa fa-plus-circle"></i> Post Job</a>
      <a href="/hr/applicants" class="nav-item"><i class="fa fa-users"></i> Applicants</a>
      <a href="/hr/company"    class="nav-item"><i class="fa fa-building"></i> Company Profile</a>
      <a href="/hr/profile"    class="nav-item"><i class="fa fa-user-circle"></i> Profile</a>
      <a href="/logout"        class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <h5 th:text="${job.id != null ? 'Edit Job' : 'Post New Job'}">Post Job</h5>
      </div>
    </div>
    <div class="page-content">
      <div class="card" style="max-width:720px;">
        <div class="card-header">
          <h5 th:text="${job.id != null ? 'Edit Job Posting' : 'New Job Posting'}">Job Form</h5>
          <span class="text-muted" style="font-size:.82rem;" th:text="${company != null ? company.companyName : ''}"></span>
        </div>
        <div class="card-body">
          <form th:action="${job.id != null ? '/hr/jobs/edit/' + job.id : '/hr/jobs/new'}" method="post">
            <div class="form-row cols-2">
              <div class="form-group">
                <label class="form-label">Job Title *</label>
                <input type="text" name="title" class="form-control" th:value="${job.title}" required placeholder="e.g. Software Engineer"/>
              </div>
              <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" th:value="${job.location}" placeholder="e.g. Pune, Remote"/>
              </div>
            </div>
            <div class="form-row cols-3">
              <div class="form-group">
                <label class="form-label">Department / Branch</label>
                <input type="text" name="department" class="form-control" th:value="${job.department}" placeholder="e.g. Computer Science"/>
              </div>
              <div class="form-group">
                <label class="form-label">Job Type</label>
                <select name="jobType" class="form-control">
                  <option value="">Select</option>
                  <option th:selected="${job.jobType == 'Full-time'}">Full-time</option>
                  <option th:selected="${job.jobType == 'Part-time'}">Part-time</option>
                  <option th:selected="${job.jobType == 'Internship'}">Internship</option>
                  <option th:selected="${job.jobType == 'Contract'}">Contract</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <select name="status" class="form-control">
                  <option value="ACTIVE"  th:selected="${job.status != null and job.status.name() == 'ACTIVE'}">Active</option>
                  <option value="DRAFT"   th:selected="${job.status != null and job.status.name() == 'DRAFT'}">Draft</option>
                  <option value="CLOSED"  th:selected="${job.status != null and job.status.name() == 'CLOSED'}">Closed</option>
                </select>
              </div>
            </div>
            <div class="form-row cols-3">
              <div class="form-group">
                <label class="form-label">Package Offered</label>
                <input type="text" name="packageOffered" class="form-control" th:value="${job.packageOffered}" placeholder="e.g. 6 LPA"/>
              </div>
              <div class="form-group">
                <label class="form-label">Vacancies</label>
                <input type="number" name="vacancies" class="form-control" th:value="${job.vacancies}" placeholder="e.g. 5" min="1"/>
              </div>
              <div class="form-group">
                <label class="form-label">Min CGPA</label>
                <input type="number" name="minCgpa" class="form-control" th:value="${job.minCgpa}" placeholder="e.g. 7.0" step="0.1" min="0" max="10"/>
              </div>
            </div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label class="form-label">Experience Required</label>
                <input type="text" name="experienceRequired" class="form-control" th:value="${job.experienceRequired}" placeholder="e.g. Fresher, 0-1 yr"/>
              </div>
              <div class="form-group">
                <label class="form-label">Last Date to Apply</label>
                <input type="date" name="lastDateToApply" class="form-control" th:value="${job.lastDateToApply}"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Required Skills</label>
              <input type="text" name="skills" class="form-control" th:value="${job.skills}" placeholder="e.g. Java, Spring Boot, MySQL (comma separated)"/>
            </div>
            <div class="form-group">
              <label class="form-label">Job Description *</label>
              <textarea name="description" class="form-control" rows="5" required
                        th:text="${job.description}" placeholder="Describe the role, responsibilities, and requirements..."></textarea>
            </div>
            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save Job</button>
              <a href="/hr/jobs" class="btn btn-outline">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
