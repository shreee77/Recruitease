<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Chat – RecruitEase</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <a href="/hr/dashboard"  class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <a href="/hr/jobs"       class="nav-item"><i class="fa fa-briefcase"></i> My Jobs</a>
      <a href="/hr/applicants" class="nav-item active"><i class="fa fa-users"></i> Applicants</a>
      <a href="/hr/company"    class="nav-item"><i class="fa fa-building"></i> Company Profile</a>
      <a href="/hr/profile"    class="nav-item"><i class="fa fa-user-circle"></i> Profile</a>
      <a href="/logout"        class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h5><i class="fa fa-comment" style="color:var(--primary);margin-right:8px;"></i>Chat with Student</h5></div>
      <div class="topbar-right"><a href="/hr/applicants" class="btn btn-outline btn-sm"><i class="fa fa-arrow-left"></i> Back</a></div>
    </div>
    <div class="page-content">
      <div class="card" style="max-width:700px;">
        <div class="card-header"><h5>Conversation</h5></div>
        <div class="chat-container">
          <div class="chat-messages">
            <div th:each="msg : ${messages}"
                 th:class="${msg.sender.id == me.id ? 'chat-bubble sent' : 'chat-bubble recv'}">
              <div th:text="${msg.message}"></div>
              <div style="font-size:.7rem;opacity:.7;margin-top:4px;" th:text="${#temporals.format(msg.sentAt,'HH:mm dd MMM')}"></div>
            </div>
            <div th:if="${#lists.isEmpty(messages)}" style="text-align:center;color:var(--text-muted);padding:32px;">
              No messages yet. Start the conversation!
            </div>
          </div>
          <form th:action="@{/hr/chat/send}" method="post" class="chat-input">
            <input type="hidden" name="receiverId" th:value="${otherId}"/>
            <input type="text" name="message" class="form-control" placeholder="Type a message..." required autocomplete="off"/>
            <button type="submit" class="btn btn-primary"><i class="fa fa-paper-plane"></i></button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
