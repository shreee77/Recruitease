<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Manage HR – RecruitEase</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <a href="/admin/dashboard" class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <div class="nav-label">Management</div>
      <a href="/admin/hr"        class="nav-item active"><i class="fa fa-users"></i> Manage HR</a>
      <a href="/admin/students"  class="nav-item"><i class="fa fa-user-graduate"></i> Students</a>
      <a href="/admin/companies" class="nav-item"><i class="fa fa-building"></i> Companies</a>
      <a href="/admin/jobs"      class="nav-item"><i class="fa fa-briefcase"></i> Job Postings</a>
      <div class="nav-label">Reports</div>
      <a href="/admin/reports"   class="nav-item"><i class="fa fa-chart-bar"></i> Reports</a>
      <a href="/admin/feedback"  class="nav-item"><i class="fa fa-comments"></i> Feedback</a>
      <div class="nav-label">Account</div>
      <a href="/admin/profile"   class="nav-item"><i class="fa fa-user-circle"></i> Profile</a>
      <a href="/logout"          class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="avatar">A</div><div><div style="font-size:.82rem;font-weight:700;">Admin</div></div></div></div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h5>Manage HR Users</h5></div>
      <div class="topbar-right">
        <a href="/admin/hr/add" class="btn btn-primary btn-sm"><i class="fa fa-plus"></i> Add HR</a>
      </div>
    </div>

    <div class="page-content">
      <div th:if="${success}" class="alert alert-success"><i class="fa fa-circle-check"></i> <span th:text="${success}"></span></div>
      <div th:if="${error}"   class="alert alert-danger"><i class="fa fa-circle-exclamation"></i> <span th:text="${error}"></span></div>

      <div class="card">
        <div class="card-header">
          <h5><i class="fa fa-users" style="color:var(--primary);margin-right:8px;"></i>All HR Users (<span th:text="${#lists.size(hrList)}">0</span>)</h5>
          <a href="/admin/hr/add" class="btn btn-primary btn-sm"><i class="fa fa-plus"></i> Add HR</a>
        </div>
        <div class="card-body" style="padding:0;">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Company</th><th>Designation</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody>
                <tr th:each="hr, idx : ${hrList}">
                  <td th:text="${idx.count}"></td>
                  <td th:text="${hr.fullName}"></td>
                  <td th:text="${hr.email}"></td>
                  <td th:text="${hr.phone != null ? hr.phone : '-'}"></td>
                  <td th:text="${hr.company != null ? hr.company.companyName : '-'}"></td>
                  <td th:text="${hr.designation != null ? hr.designation : '-'}"></td>
                  <td>
                    <span th:class="${hr.active ? 'badge badge-active' : 'badge badge-inactive'}"
                          th:text="${hr.active ? 'Active' : 'Inactive'}"></span>
                  </td>
                  <td>
                    <div class="d-flex gap-2">
                      <form th:action="@{/admin/hr/toggle/{id}(id=${hr.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-outline btn-sm"
                                th:text="${hr.active ? 'Disable' : 'Enable'}"></button>
                      </form>
                      <form th:action="@{/admin/hr/delete/{id}(id=${hr.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm"
                                data-confirm="Delete this HR permanently?">Delete</button>
                      </form>
                    </div>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(hrList)}">
                  <td colspan="8" class="text-center text-muted" style="padding:32px;">No HR users found. <a href="/admin/hr/add">Add one</a></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
