<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – RecruitEase</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
    .choice-card {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: all .2s ease;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .choice-card:hover { border-color: var(--primary); transform: translateY(-3px); color: var(--text); box-shadow: 0 8px 24px rgba(230,57,70,.15); }
    .choice-card .icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
    .choice-card h4 { font-size: 1rem; font-weight: 700; }
    .choice-card p  { font-size: .8rem; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <div class="logo-icon">R</div>
      <span>RecruitEase</span>
    </div>
    <div class="auth-title">
      <h2>Create Account</h2>
      <p>Choose how you'd like to register</p>
    </div>

    <div class="choice-grid">
      <a th:href="@{/register/student}" class="choice-card">
        <div class="icon" style="background:rgba(230,57,70,.1); color:var(--primary);">
          <i class="fa fa-user-graduate"></i>
        </div>
        <h4>Student</h4>
        <p>Browse jobs and apply for campus placements</p>
      </a>
     <!-- <a th:href="@{/register/hr}" class="choice-card">
       <div class="icon" style="background:rgba(29,53,87,.1); color:var(--secondary);">
          <i class="fa fa-briefcase"></i>
        </div>
        <h4>HR</h4>
        <p>Post jobs and manage campus recruitment</p>
      </a>
    </div> -->

    <div class="text-center mt-4">
      <p class="text-muted">Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </div>
  </div>
</div>
</body>
</html>
