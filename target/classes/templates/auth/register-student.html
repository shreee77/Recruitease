<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Register – RecruitEase</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:560px;">
    <div class="auth-logo">
      <div class="logo-icon">R</div>
      <span>RecruitEase</span>
    </div>
    <div class="auth-title">
      <h2>Student Registration</h2>
      <p>Create your account to start applying</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">
      <i class="fa fa-circle-exclamation"></i> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register/student}" method="post">
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" name="fullName" class="form-control" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="10-digit number"/>
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Branch / Stream *</label>
          <select name="branch" class="form-control" required>
            <option value="">Select Branch</option>
            <option>Computer Science</option>
            <option>Information Technology</option>
            <option>Electronics</option>
            <option>Mechanical</option>
            <option>Civil</option>
            <option>Electrical</option>
            <option>MBA</option>
            <option>BCA</option>
            <option>MCA</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Graduation Year</label>
          <input type="number" name="graduationYear" class="form-control" placeholder="e.g. 2025" min="2020" max="2030"/>
        </div>
      </div>
      <div class="form-row cols-2">
       <!-- <div class="form-group">
          <label class="form-label">College Name</label>
          <input type="text" name="collegeName" class="form-control" placeholder="Your college name"/>
        </div> -->
        <div class="form-group">
          <label class="form-label">CGPA</label>
          <input type="number" name="cgpa" class="form-control" placeholder="e.g. 8.5" step="0.1" min="0" max="10"/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100">
        <i class="fa fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="text-center mt-3">
      <p class="text-muted">Already registered? <a th:href="@{/login}">Sign in</a></p>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
