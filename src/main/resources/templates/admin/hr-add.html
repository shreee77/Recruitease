<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Add HR – RecruitEase</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard" class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <a href="/admin/hr"        class="nav-item active"><i class="fa fa-users"></i> Manage HR</a>
      <a href="/admin/students"  class="nav-item"><i class="fa fa-user-graduate"></i> Students</a>
      <a href="/admin/companies" class="nav-item"><i class="fa fa-building"></i> Companies</a>
      <a href="/admin/jobs"      class="nav-item"><i class="fa fa-briefcase"></i> Job Postings</a>
      <a href="/admin/reports"   class="nav-item"><i class="fa fa-chart-bar"></i> Reports</a>
      <a href="/admin/feedback"  class="nav-item"><i class="fa fa-comments"></i> Feedback</a>
      <a href="/logout"          class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-left"><h5>Add New HR</h5></div></div>
    <div class="page-content">
      <div th:if="${error}" class="alert alert-danger"><i class="fa fa-circle-exclamation"></i> <span th:text="${error}"></span></div>
      <div class="card" style="max-width:600px;">
        <div class="card-header"><h5>HR Details</h5></div>
        <div class="card-body">
          <form th:action="@{/admin/hr/add}" method="post">
            <div class="form-row cols-2">
              <div class="form-group">
                <label class="form-label">Full Name *</label>
                <input type="text" name="fullName" class="form-control" required/>
              </div>
              <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-control" required/>
              </div>
            </div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" name="password" class="form-control" required minlength="6"/>
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"/>
              </div>
            </div>
            <div class="form-row cols-2">
              <div class="form-group">
                <label class="form-label">Designation</label>
                <input type="text" name="designation" class="form-control" placeholder="HR Manager"/>
              </div>
              <div class="form-group">
                <label class="form-label">Company *</label>
                <select name="companyId" class="form-control" required>
                  <option value="">Select Company</option>
                  <option th:each="c : ${companies}" th:value="${c.id}" th:text="${c.companyName}"></option>
                </select>
              </div>
            </div>
            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save HR</button>
              <a href="/admin/hr" class="btn btn-outline">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
