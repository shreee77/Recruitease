<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Reports – RecruitEase</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard" class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <a href="/admin/hr"        class="nav-item"><i class="fa fa-users"></i> Manage HR</a>
      <a href="/admin/students"  class="nav-item"><i class="fa fa-user-graduate"></i> Students</a>
      <a href="/admin/companies" class="nav-item"><i class="fa fa-building"></i> Companies</a>
      <a href="/admin/jobs"      class="nav-item"><i class="fa fa-briefcase"></i> Job Postings</a>
      <a href="/admin/reports"   class="nav-item active"><i class="fa fa-chart-bar"></i> Reports</a>
      <a href="/admin/feedback"  class="nav-item"><i class="fa fa-comments"></i> Feedback</a>
      <a href="/logout"          class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-left"><h5>Reports</h5></div></div>
    <div class="page-content">
      <div class="stat-grid mb-4">
        <div class="stat-card">
          <div class="stat-icon red"><i class="fa fa-calendar-day"></i></div>
          <div><div class="stat-value" th:text="${todaysPostings}">0</div><div class="stat-label">Today's Postings</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fa fa-briefcase"></i></div>
          <div><div class="stat-value" th:text="${totalJobs}">0</div><div class="stat-label">Total Jobs</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fa fa-file-alt"></i></div>
          <div><div class="stat-value" th:text="${totalApplications}">0</div><div class="stat-label">Total Applications</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h5>HR Activity Report</h5></div>
        <div class="card-body" style="padding:0;">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>#</th><th>HR Name</th><th>Email</th><th>Company</th><th>Designation</th></tr>
              </thead>
              <tbody>
                <tr th:each="hr, idx : ${hrList}">
                  <td th:text="${idx.count}"></td>
                  <td th:text="${hr.fullName}"></td>
                  <td th:text="${hr.email}"></td>
                  <td th:text="${hr.company != null ? hr.company.companyName : '-'}"></td>
                  <td th:text="${hr.designation != null ? hr.designation : '-'}"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
