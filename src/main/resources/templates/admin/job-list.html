<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Job Postings – RecruitEase</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard" class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <a href="/admin/hr"        class="nav-item"><i class="fa fa-users"></i> Manage HR</a>
      <a href="/admin/students"  class="nav-item"><i class="fa fa-user-graduate"></i> Students</a>
      <a href="/admin/companies" class="nav-item"><i class="fa fa-building"></i> Companies</a>
      <a href="/admin/jobs"      class="nav-item active"><i class="fa fa-briefcase"></i> Job Postings</a>
      <a href="/admin/reports"   class="nav-item"><i class="fa fa-chart-bar"></i> Reports</a>
      <a href="/admin/feedback"  class="nav-item"><i class="fa fa-comments"></i> Feedback</a>
      <a href="/logout"          class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-left"><h5>All Job Postings</h5></div></div>
    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <h5><i class="fa fa-briefcase" style="color:var(--primary);margin-right:8px;"></i>Job Postings (<span th:text="${#lists.size(jobs)}">0</span>)</h5>
        </div>
        <div class="card-body" style="padding:0;">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>#</th><th>Title</th><th>Company</th><th>Posted By</th><th>Location</th><th>Type</th><th>Package</th><th>Status</th><th>Last Date</th></tr>
              </thead>
              <tbody>
                <tr th:each="j, idx : ${jobs}">
                  <td th:text="${idx.count}"></td>
                  <td><strong th:text="${j.title}"></strong></td>
                  <td th:text="${j.company.companyName}"></td>
                  <td th:text="${j.postedBy.fullName}"></td>
                  <td th:text="${j.location != null ? j.location : '-'}"></td>
                  <td th:text="${j.jobType != null ? j.jobType : '-'}"></td>
                  <td th:text="${j.packageOffered != null ? j.packageOffered : '-'}"></td>
                  <td>
                    <span th:class="${'badge badge-' + j.status.name().toLowerCase()}" th:text="${j.status}"></span>
                  </td>
                  <td th:text="${j.lastDateToApply != null ? #temporals.format(j.lastDateToApply,'dd MMM yyyy') : '-'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(jobs)}">
                  <td colspan="9" class="text-center text-muted" style="padding:32px;">No jobs posted yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
