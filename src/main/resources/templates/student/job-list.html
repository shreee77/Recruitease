<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Browse Jobs – RecruitEase</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-logo">R</div><span>RecruitEase</span></div>
    <nav class="sidebar-nav">
      <a href="/student/dashboard"    class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
      <a href="/student/jobs"         class="nav-item active"><i class="fa fa-briefcase"></i> Browse Jobs</a>
      <a href="/student/applications" class="nav-item"><i class="fa fa-file-alt"></i> My Applications</a>
      <a href="/student/profile"      class="nav-item"><i class="fa fa-user-circle"></i> Profile &amp; Resume</a>
      <a href="/student/feedback"     class="nav-item"><i class="fa fa-star"></i> Give Feedback</a>
      <a href="/logout"               class="nav-item"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h5>Browse Jobs</h5></div>
      <div class="topbar-right"><span class="text-muted" style="font-size:.82rem;"><span th:text="${#lists.size(jobs)}">0</span> jobs found</span></div>
    </div>

    <div class="page-content">
      <!-- Search Bar -->
      <form th:action="@{/student/jobs}" method="get" class="search-bar">
        <input type="text" name="location" class="form-control"
               placeholder="&#xf3c5; Location" th:value="${location}"/>
        <input type="text" name="department" class="form-control"
               placeholder="&#xf19c; Department / Branch" th:value="${department}"/>
        <input type="text" name="company" class="form-control"
               placeholder="&#xf1ad; Company Name" th:value="${company}"/>
        <button type="submit" class="btn btn-primary"><i class="fa fa-search"></i> Search</button>
        <a href="/student/jobs" class="btn btn-outline"><i class="fa fa-rotate-right"></i> Reset</a>
      </form>

      <!-- Job Grid -->
      <div class="job-grid" th:if="${!#lists.isEmpty(jobs)}">
        <div class="job-card" th:each="job : ${jobs}">
          <div class="job-card-header">
            <div class="company-logo">
              <img th:if="${job.company.logoPath != null}" th:src="@{/uploads/{p}(p=${job.company.logoPath})}" alt="logo"/>
              <span th:unless="${job.company.logoPath != null}" th:text="${#strings.substring(job.company.companyName,0,1)}"></span>
            </div>
            <div>
              <div class="job-title" th:text="${job.title}"></div>
              <div class="job-company" th:text="${job.company.companyName}"></div>
            </div>
          </div>

          <div class="job-meta">
            <div class="job-meta-item" th:if="${job.location != null}">
              <i class="fa fa-location-dot"></i> <span th:text="${job.location}"></span>
            </div>
            <div class="job-meta-item" th:if="${job.jobType != null}">
              <i class="fa fa-clock"></i> <span th:text="${job.jobType}"></span>
            </div>
            <div class="job-meta-item" th:if="${job.packageOffered != null}">
              <i class="fa fa-indian-rupee-sign"></i> <span th:text="${job.packageOffered}"></span>
            </div>
            <div class="job-meta-item" th:if="${job.department != null}">
              <i class="fa fa-graduation-cap"></i> <span th:text="${job.department}"></span>
            </div>
          </div>

          <div th:if="${job.skills != null}" style="font-size:.78rem;color:var(--text-muted);">
            <i class="fa fa-code" style="margin-right:4px;"></i>
            <span th:text="${job.skills}"></span>
          </div>

          <div class="job-card-footer">
            <span style="font-size:.75rem;color:var(--text-muted);">
              Last date:
              <strong th:text="${job.lastDateToApply != null ? #temporals.format(job.lastDateToApply,'dd MMM yyyy') : 'Open'}"></strong>
            </span>
            <a th:href="@{/student/jobs/{id}(id=${job.id})}" class="btn btn-primary btn-sm">
              View &amp; Apply
            </a>
          </div>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(jobs)}" class="text-center" style="padding:60px 0;">
        <i class="fa fa-search" style="font-size:3rem;color:var(--border);"></i>
        <p class="text-muted mt-3">No jobs found matching your search.</p>
        <a href="/student/jobs" class="btn btn-outline mt-2">Clear Filters</a>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
