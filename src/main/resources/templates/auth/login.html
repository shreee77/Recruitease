<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – RecruitEase</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">R</div>
      <span>RecruitEase</span>
    </div>

    <div class="auth-title">
      <h2>Welcome Back</h2>
      <p>Sign in to your account to continue</p>
    </div>

    <!-- Alerts -->
    <div th:if="${error}" class="alert alert-danger">
      <i class="fa fa-circle-exclamation"></i>
      <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success">
      <i class="fa fa-circle-check"></i>
      <span th:text="${success}"></span>
    </div>
    <div th:if="${logout}" class="alert alert-info">
      <i class="fa fa-info-circle"></i>
      <span th:text="${logout}"></span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="username" class="form-control"
               placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter your password" required/>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100" style="margin-top:8px;">
        <i class="fa fa-sign-in-alt"></i> Sign In
      </button>
    </form>

	
  <!--   <div class="text-center mt-4">
      <p class="text-muted">Don't have an account?
        <a th:href="@{/register}">Register here</a>
      </p>
    </div>  -->
	
	
    <div class="text-center mt-3" style="font-size:.78rem; color:#adb5bd;">
   
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
